name: "SIXTA CI: SQL and DDL review"
description: "Catches dangerous SQL and DDL migrations in CI"
author: "SIXTA"
branding:
  icon: "database"
  color: "green"

# Required env (set from secrets in your workflow):
#   SIXTA_API_KEY    free key from connect.sixta.ai/portal (required: the hosted endpoint rejects anonymous calls; unset only works against self-hosted servers with anonymous access enabled)
#   GITHUB_TOKEN     provided automatically; needs `pull-requests: write` for the PR comment
#
# The calling job must checkout with fetch-depth: 0 (the review diffs against the
# PR base), and grant `pull-requests: write` + `security-events: write` (SARIF).

inputs:
  engine:
    description: "postgresql, mysql, or auto (detects the engine from pom.xml / build.gradle / application.*, falling back to postgresql)."
    default: "auto"
  engine_version:
    description: "Production engine version, e.g. 16 or 8.0.35. Verdicts are version-dependent — set this."
    default: ""
  gate:
    description: "Fail the check when any finding is at or above this severity (critical/high/medium/low/none)."
    default: "high"
  fail_mode:
    description: "open = SIXTA unreachable -> warn and pass; closed -> fail. Findings always gate. A rejected configured API key (401/403) always fails, regardless of mode; anonymous runs follow fail_mode."
    default: "open"
  api:
    description: "mcp or v1. Defaults to v1 (one batch POST per run, server-rendered SARIF)."
    default: "v1"
  require_rollback:
    description: "v1 only. true raises the no-rollback finding to gate-able severity. Leave false for roll-forward-only policies."
    default: "false"
  schema_cmd:
    description: "v1 only — command whose stdout is the shared schema DDL (default pg_dump --schema-only when a DB is configured)."
    default: ""
  setup:
    description: "Command that installs your Django env so manage.py runs (e.g. pip install -r requirements.txt). Leave empty for a repo with only .sql migrations — no DB or Django needed."
    default: ""
  manage_py:
    description: "Path to manage.py (relative to working_directory)."
    default: "manage.py"
  alembic_config:
    description: "Alembic config for offline SQL render (alembic upgrade --sql). No database needed."
    default: "alembic.ini"
  liquibase_cmd:
    description: "Liquibase CLI for offline changelog rendering (update-sql). Install it via `setup` when using XML/YAML/JSON changelogs; SQL-format changelogs need no CLI."
    default: "liquibase"
  working_directory:
    description: "Directory to run the review in (where manage.py lives). Set for a monorepo with the Django app in a subdirectory."
    default: "."
  sixta_url:
    description: "SIXTA endpoint."
    default: "https://connect.sixta.ai/mcp"
  sarif:
    description: "Path to write the SARIF report for code-scanning upload."
    default: "sixta.sarif"
  python_version:
    description: "Python used to run the reviewer (and your Django project)."
    default: "3.13"
  script_ref:
    description: "Git ref of sixta-systems/sixta-ci to fetch sixta_review.py from. Pin a tag."
    default: "v0.4.2"

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python_version }}
    - name: Install project (for sqlmigrate)
      if: ${{ inputs.setup != '' }}
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: ${{ inputs.setup }}
    - name: SIXTA review
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      env:
        # SIXTA_API_KEY is inherited from the job/step env (set it from secrets).
        GITHUB_TOKEN: ${{ github.token }}
        SIXTA_ENGINE: ${{ inputs.engine }}
        SIXTA_ENGINE_VERSION: ${{ inputs.engine_version }}
        SIXTA_GATE: ${{ inputs.gate }}
        SIXTA_FAIL_MODE: ${{ inputs.fail_mode }}
        SIXTA_API: ${{ inputs.api }}
        SIXTA_REQUIRE_ROLLBACK: ${{ inputs.require_rollback }}
        SIXTA_SCHEMA_CMD: ${{ inputs.schema_cmd }}
        SIXTA_URL: ${{ inputs.sixta_url }}
        SIXTA_MANAGE_PY: ${{ inputs.manage_py }}
        SIXTA_ALEMBIC_CONFIG: ${{ inputs.alembic_config }}
        SIXTA_LIQUIBASE_CMD: ${{ inputs.liquibase_cmd }}
        SIXTA_SARIF: ${{ inputs.sarif }}
      run: |
        curl -fsSL "https://raw.githubusercontent.com/sixta-systems/sixta-ci/${{ inputs.script_ref }}/sixta_review.py" -o "${RUNNER_TEMP}/sixta_review.py"
        python "${RUNNER_TEMP}/sixta_review.py" --platform github
